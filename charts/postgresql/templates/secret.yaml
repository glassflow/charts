{{- $host := include "postgresql.host" . }}
{{- $port := .Values.service.port | default 5432 | int }}
{{- $database := .Values.auth.database | default "glassflow" }}
{{- $usingExistingSecret := and .Values.auth.existingSecret.enabled .Values.auth.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: glassflow-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
type: Opaque
data:
  # Connection information (always created)
  host: {{ $host | b64enc | quote }}
  port: {{ $port | toString | b64enc | quote }}
  database: {{ $database | b64enc | quote }}
  # Connection URL template (without password for security)
  # Format: postgresql://username:password@host:port/database
  connection-url-template: {{ printf "postgresql://%s:%d/%s" $host $port $database | b64enc | quote }}
{{- if not $usingExistingSecret }}
{{- $userPassword := .Values.auth.password }}
{{- if not $userPassword }}
{{- $userPassword = randAlphaNum 16 }}
{{- end }}
{{- $username := .Values.auth.username }}
{{- if not $username }}
{{- $username = printf "pguser_%s" (randAlphaNum 8) }}
{{- end }}
{{- $sslmode := .Values.auth.sslmode | default "disable" }}
{{- $directConnectionUrl := printf "postgresql://%s:%s@%s:%d/%s?sslmode=%s" $username $userPassword $host $port $database $sslmode }}
  # Credentials (only created when not using existing secret)
  username: {{ $username | b64enc | quote }}
  password: {{ $userPassword | b64enc | quote }}
  {{- if .Values.global.pgbouncer.enabled }}
  {{- $pgbouncerHost := printf "%s-pgbouncer.%s.svc.cluster.local" .Release.Name .Release.Namespace }}
  {{- $pgbouncerUrl := printf "postgresql://%s:%s@%s:5432/%s?sslmode=disable" $username $userPassword $pgbouncerHost $database }}
  # When pgbouncer is enabled, connection-url points to PGBouncer (used by API, operator, and pipeline components).
  # direct-connection-url points to PostgreSQL directly (used by DB migrations).
  connection-url: {{ $pgbouncerUrl | b64enc | quote }}
  direct-connection-url: {{ $directConnectionUrl | b64enc | quote }}
  {{- else }}
  connection-url: {{ $directConnectionUrl | b64enc | quote }}
  {{- end }}
{{- end }}