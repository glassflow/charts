# Default values for glassflow-etl.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
# Global settings that apply across all components of the chart
global:
  # Global image registry - if set, will be prepended to all image repositories
  imageRegistry: "ghcr.io/glassflow/"
  observability:
    metrics:
      enabled: true
    logs:
      enabled: false
      # Exporters map: keys are OTel exporter names, values are their config.
      # At least one exporter must be configured when logs.enabled=true.
      # Any OTel-supported exporter type is accepted (otlp, otlphttp, etc.).
      # Example:
      #   exporter:
      #     otlp:
      #       endpoint: "my-collector:4317"
      #       tls:
      #         insecure: true
      #     otlphttp:
      #       endpoint: "http://my-collector:4318"
      #       headers:
      #         Authorization: "Bearer <token>"
      exporter: {}
    # OpenTelemetry collector resources (used when metrics or logs are enabled)
    otelCollector:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
  notifications:  # configure slack / email channel details in notificationService section below
    enabled: false
  nats:
    # NATS address for the operator to connect to
    # Defaults to {{ .Release.Name }}-nats.{{ .Release.Namespace }}.svc.cluster.local:4222 if not specified
    # address: ""
    stream:
      maxAge: 24h
      maxBytes: 0

  # Pipelines namespace configuration
  pipelines:
    namespace:
      # When true, operator creates per-pipeline namespaces (pipeline-<id>)
      auto: true
      # When auto is false, the fixed namespace to deploy all pipelines into
      name: glassflow-pipelines
      # When auto is false, Helm can optionally create the namespace and add label managed-by=helm
      create: true

  usageStats:
    enabled: true
    # Optional: provide an installation ID
    installationId: ""

  # Only used when postgresql.enabled is false
  postgres:
    # PostgreSQL connection URL
    # Format: postgresql://username:password@host:port/database
    # Note: when global.pgbouncer.enabled=true, this value is ignored. PGBouncer is only
    # supported with the internal PostgreSQL deployment (postgresql.enabled=true).
    # For external PostgreSQL, manage your own connection pooler and point
    # connection_url to it directly.
    connection_url: ""
    # Alternatively, source the connection URL from a Kubernetes secret
    secret:
      name: ""
      key: "connection_url"

  # PGBouncer toggle — this is the single flag to enable/disable PGBouncer.
  # Setting this to true:
  #   - Deploys the PGBouncer subchart
  #   - Configures the glassflow-postgresql secret so that connection-url points to
  #     PGBouncer instead of PostgreSQL directly (transparent to all components)
  #   - Routes DB migrations to PostgreSQL directly via direct-connection-url
  # Only supported with postgresql.enabled=true (internal PostgreSQL).
  pgbouncer:
    enabled: false

  # Encryption configuration for connection credentials
  encryption:
    # Enable credential encryption (encrypts Kafka and ClickHouse connection details)
    enabled: false
    # Provide your own Kubernetes secret (required when enabled=true)
    # The chart does not create this secret.
    existingSecret:
      name: ""  # e.g., "glassflow-encryption-key"
      key: "encryption-key"  # Key name in secret
# =============================================================================
# API COMPONENT CONFIGURATION
# =============================================================================
# Backend API service configuration for the GlassFlow ETL application
api:
  replicas: 1
  logLevel: "info"
  image:
    repository: glassflow-etl-be
    tag: v2.11.2
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "100Mi"  # Memory request - adjust based on your workload
      cpu: "100m"      # CPU request - adjust based on your workload
    # Maximum resources the API pods can use
    limits:
      memory: "200Mi"    # Memory limit - adjust based on your workload
      cpu: "250m"      # CPU limit - adjust based on your workload

  service:
    type: ClusterIP
    port: 8081
    targetPort: 8081

  # Environment variables for the API service
  # Supported variables:
  # - GLASSFLOW_LOG_FILE_PATH: Path to the log file (Default: /tmp/logs/glassflow)
  # - GLASSFLOW_LOG_LEVEL: Log level (Default: INFO)
  # Example:
  # env:
  #   - name: GLASSFLOW_LOG_LEVEL
  #     value: "DEBUG"
  env: []

# =============================================================================
# UI COMPONENT CONFIGURATION
# =============================================================================
# Frontend UI service configuration for the GlassFlow ETL application
ui:
  enabled: true
  replicas: 1
  image:
    repository: glassflow-etl-fe
    tag: v2.11.2
    pullPolicy: IfNotPresent
  logLevel: "info"
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "200m"

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  # Environment variables for the UI service
  # Supported variables:
  # - NEXT_PUBLIC_API_URL: API URL for the application
  # - KAFKA_GATEWAY_URL: Kafka Kerberos Gateway URL (set automatically for sidecar)
  # Example:
  # env:
  #   - name: NEXT_PUBLIC_API_URL
  #     value: "http://{{ .Release.Name }}-api.{{ .Release.Namespace }}.svc.cluster.local:8080"
  env: []

  # Auth0 configuration for authentication
  auth0:
    # Enable or disable Auth0 authentication
    enabled: false
    # Profile route endpoint (default: /api/auth/me)
    profileRoute: "/api/auth/me"
    # Auth0 secret for session encryption
    secret: ""
    # Base URL of the application (default: http://localhost:8080)
    appBaseUrl: "http://localhost:8080"
    # Auth0 domain (e.g., your-tenant.auth0.com)
    domain: ""
    # Auth0 issuer base URL
    issuerBaseUrl: ""
    # Auth0 client ID
    clientId: ""
    # Auth0 client secret
    clientSecret: ""

  # Kafka Kerberos Gateway sidecar configuration
  # This sidecar provides Kerberos authentication support for Kafka connections
  kafkaGateway:
    enabled: true
    image:
      repository: kafka-kerberos-gateway
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "128Mi"  # Memory request - gateway is lightweight
        cpu: "50m"       # CPU request - 50 millicores = 0.05 CPU cores
      # Maximum resources the gateway sidecar can use
      limits:
        memory: "256Mi"  # Memory limit - gateway doesn't need much
        cpu: "200m"      # CPU limit - 200 millicores = 0.2 CPU cores

    # Port for the gateway service (internal to pod)
    port: 8082

# =============================================================================
# GLASSFLOW OPERATOR CONFIGURATION
# =============================================================================
# Kubernetes operator for managing ETL pipelines and related resources
glassflow-operator:
  # Operator deployment configuration
  controllerManager:
    replicas: 1
    manager:
      # Maximum duration a reconcile operation can run before timing out.
      # Must be a valid Go duration string (e.g. 15m, 1h).
      reconcileTimeout: 15m
      image:
        repository: glassflow-etl-k8s-operator
        tag: v2.1.0
        pullPolicy: IfNotPresent
      resources:
        limits:
          cpu: 500m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 64Mi
    serviceAccount:
      annotations: {}

  glassflowComponents:
    ingestor:
      image:
        repository: glassflow-etl-ingestor
        tag: v2.11.2
        pullPolicy: IfNotPresent
      logLevel: "INFO"
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
        limits:
          cpu: 500m
          memory: 750Mi
      # Node affinity for ingestor component (optional)
      affinity: {}
    join:
      image:
        repository: glassflow-etl-join
        tag: v2.11.2
        pullPolicy: IfNotPresent
      logLevel: "INFO"
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
        limits:
          cpu: 500m
          memory: 750Mi
      # Node affinity for join component (optional)
      affinity: {}
    sink:
      image:
        repository: glassflow-etl-sink
        tag: v2.11.2
        pullPolicy: IfNotPresent
      logLevel: "INFO"
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
        limits:
          cpu: 500m
          memory: 1.5Gi
      # Node affinity for sink component (optional)
      affinity: {}
    dedup:
      image:
        repository: glassflow-etl-dedup
        tag: v2.11.2
        pullPolicy: IfNotPresent
      logLevel: "INFO"
      resources:
        requests:
          cpu: 1000m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
      storage:
        size: "40Gi"
        className: ""
      affinity: {}
# =============================================================================
# NATS OPERATOR CONFIGURATION
# =============================================================================
# NATS prometheus exporter for getting metrics from NATS
# This is enabled when global.observability.metrics.enabled is true
natsPrometheusExporter:
  image:
    repository: natsio/prometheus-nats-exporter
    tag: 0.17.3
    pullPolicy: IfNotPresent
  metrics:
    accstatz: true
    connz: true
    connz_detailed: true
    jsz: true
    gatewayz: true
    leafz: true
    routez: true
    subz: true
    varz: true
  service:
    type: ClusterIP
    port: 80
    targetPort: 7777
    protocol: TCP
    name: http


# =============================================================================
# POSTGRESQL CONFIGURATION
# =============================================================================
# PostgreSQL database configuration
# When enabled, the postgresql dependency chart will be deployed
# When disabled, use global.postgres.connection_url or global.postgres.secret.name to connect to an external PostgreSQL instance
postgresql:
  # Enable or disable PostgreSQL deployment
  # Set to false if you want to use an external PostgreSQL instance
  enabled: true
  # PostgreSQL configuration settings
  # These values are passed to the postgresql dependency chart
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent

  replicaCount: 1
  auth:
    enabled: true
    database: "glassflow"
    # PostgreSQL SSL mode for connection URL
    # Valid values: disable, allow, prefer, require, verify-ca, verify-full
    sslmode: "disable"
    # Please update this for production deployments
    username: "glassflow"
    password: "glassflow123"
    existingSecret:
      enabled: false
      name: ""
      keys:
        usernameKey: username
        passwordKey: password
        databaseKey: database

  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432
    annotations: {}

  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# =============================================================================
# PGBOUNCER CONFIGURATION
# =============================================================================
# PGBouncer connection pooler configuration.
#
# Enable via: --set global.pgbouncer.enabled=true
#
# When enabled, PGBouncer is deployed and all pipeline components, the API,
# and the operator connect to PostgreSQL through it. This prevents connection
# exhaustion when many pipeline replicas are running (e.g. schema evolution with
# many ingestor/sink replicas each holding their own connection pool).
#
# Requirements:
#   - postgresql.enabled must be true (internal PostgreSQL).
#     For external PostgreSQL, manage your own connection pooler and point
#     global.postgres.connection_url to it directly.
#
# Existing users are not affected: defaults to disabled (global.pgbouncer.enabled=false).
pgbouncer:
  image:
    repository: bitnami/pgbouncer
    tag: "1.23.1"
    pullPolicy: IfNotPresent

  # Pool mode: transaction (recommended) or session.
  # transaction - server connection is returned to the pool after each transaction.
  #   Most efficient. Requires QueryExecModeSimpleProtocol in the glassflow-api
  #   postgres driver, which is set automatically when pgbouncer is enabled.
  # session - server connection held for the entire client session.
  #   Compatible with prepared statements but provides less pooling benefit.
  poolMode: "transaction"

  # Maximum number of client connections PGBouncer will accept
  maxClientConn: 100

  # Number of server connections per user/database pair
  defaultPoolSize: 20

  # Minimum number of server connections kept open (0 = none)
  minPoolSize: 0

  # Extra server connections to use when pool is exhausted
  reservePoolSize: 5

  # Seconds a server connection can be idle before being closed (0 = disable)
  serverIdleTimeout: 600

  # Seconds a client connection can be idle before being closed (0 = disable)
  clientIdleTimeout: 0

  # Startup parameters to silently ignore (pgx sends extra_float_digits by default)
  ignoreStartupParameters: "extra_float_digits"

  # Server reset query run when a connection is returned to the pool.
  # Leave empty for transaction mode. Set to "DISCARD ALL" for session mode.
  serverResetQuery: ""

  replicaCount: 1

  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

# =============================================================================
# NATS CONFIGURATION
# =============================================================================
# NATS messaging system configuration for internal communication
nats:
  # Enable or disable NATS deployment
  # Set to false if you want to use an external NATS instance
  enabled: true
  config:
    cluster:
      enabled: true
      port: 6222
      replicas: 3
    jetstream:
      enabled: true
      memoryStore:
        enabled: false
        maxSize: 1Gi
      fileStore:
        enabled: true
        dir: /data
        pvc:
          enabled: true
          size: 100Gi
          storageClassName: ""
  container:
    merge:
      resources:
        requests:
          memory: "4Gi"
          cpu: "2000m"
        limits:
          memory: "4Gi"
          cpu: "2000m"

# =============================================================================
# INGRESS CONFIGURATION
# =============================================================================
# Ingress configuration for external access to the application
ingress:
  # Enable or disable ingress
  # Set to true to expose the application externally
  enabled: false

  # Ingress class name (required for Kubernetes 1.18+)
  # Example: "nginx", "traefik", "istio"
  ingressClassName: ""

  # Annotations for the ingress resource
  # Useful for SSL termination, rate limiting, etc.
  annotations: {}

  # Host configurations for the ingress
  # Example:
  # - host: "etl.example.com"
  #   paths:
  #     - path: "/"
  #       pathType: Prefix
  #       serviceName: "glassflow-etl-ui"
  #       servicePort: 8080
  hosts: []

  # TLS configuration for HTTPS
  # Example:
  # - hosts:
  #     - "etl.example.com"
  #   secretName: "etl-tls-secret"
  tls: []

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
# Pod and container security context settings
podSecurityContext: {}
  # fsGroup: 2000  # File system group ID

# Container security context settings
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# =============================================================================
# SERVICE ACCOUNT CONFIGURATION
# =============================================================================
# Service account configuration for the application (UI and API)
serviceAccount:
  # Create a new service account for the application (UI and API)
  # Set to false if you want to use an existing service account
  create: true

  # Automatically mount the service account's API credentials
  # Useful for accessing the Kubernetes API from within pods
  automount: true

  # Annotations to add to the service account
  # Useful for IAM roles, OIDC providers, etc.
  annotations: {}

  # Name of the service account to use
  # If not set and create is true, a name is generated using the fullname template
  # Example: "glassflow-etl-sa"
  name: ""

# =============================================================================
# POD CONFIGURATION
# =============================================================================
# Pod-level configuration settings
podAnnotations: {}  # Annotations to add to all pods
podLabels: {}       # Labels to add to all pods

# Node selector for main application pods (UI and API)
# Useful for scheduling pods on specific nodes
# Example:
# nodeSelector:
#   kubernetes.io/os: linux
#   node-role.kubernetes.io/worker: "true"
nodeSelector: {}

# Pod tolerations for scheduling
# Useful for running pods on nodes with taints
# Example:
# - key: "dedicated"
#   operator: "Equal"
#   value: "glassflow"
#   effect: "NoSchedule"
tolerations: []

# Pod affinity rules for scheduling
# Useful for co-locating or spreading pods
# Example:
# podAffinity:
#   requiredDuringSchedulingIgnoredDuringExecution:
#   - labelSelector:
#       matchExpressions:
#       - key: app
#         operator: In
#         values:
#         - glassflow-etl
#     topologyKey: kubernetes.io/hostname
affinity: {}

# =============================================================================
# AUTOSCALING CONFIGURATION
# =============================================================================
# Horizontal Pod Autoscaler (HPA) configuration
autoscaling:
  # Enable or disable autoscaling
  enabled: false

  # Minimum number of replicas when autoscaling
  minReplicas: 1

  # Maximum number of replicas when autoscaling
  maxReplicas: 5

  # Target CPU utilization percentage for scaling
  # HPA will scale up when CPU usage exceeds this percentage
  targetCPUUtilizationPercentage: 80

  # Target memory utilization percentage for scaling (commented out)
  # Uncomment and set a value to enable memory-based scaling
  # targetMemoryUtilizationPercentage: 80

# =============================================================================
# NOTIFICATION SERVICE COMPONENT CONFIGURATION
# =============================================================================
# Notification service for sending Slack and Email notifications
notificationService:
  replicas: 1
  image:
    repository: glassflow-notifier
    tag: v1.0.1
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "100Mi"
      cpu: "100m"
    limits:
      memory: "200Mi"
      cpu: "250m"

  service:
    type: ClusterIP
    port: 8082
    targetPort: 8080

  # Slack Configuration
  slack:
    enabled: "false"  # Set to true and add webhook URL
    webhookUrl: ""  # Add your Slack webhook URL here
    defaultChannel: "#notifications"

  # Email Configuration
  email:
    enabled: "false"  # Set to true and add SMTP details
    smtpHost: ""  # Add your SMTP host
    smtpPort: 587
    smtpUsername: ""  # Add your SMTP username
    smtpPassword: ""  # Add your SMTP password
    fromAddress: ""  # Add sender email address
    toAddress: ""  # Add recipient email address

  # Environment variables for the notification service
  # Example:
  # env:
  #   - name: CUSTOM_VAR
  #     value: "custom_value"
  env: []

  # Liveness probe configuration (optional)
  # livenessProbe:
  #   httpGet:
  #     path: /health
  #     port: 8080
  #   initialDelaySeconds: 30
  #   periodSeconds: 10

  # Readiness probe configuration (optional)
  # readinessProbe:
  #   httpGet:
  #     path: /ready
  #     port: 8080
  #   initialDelaySeconds: 5
  #   periodSeconds: 5
