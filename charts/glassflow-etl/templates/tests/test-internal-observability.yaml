{{- $vm := .Values.global.observability.metrics.internal.enabled -}}
{{- $vl := .Values.global.observability.logs.internal.enabled -}}
{{- if or $vm $vl }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "glassflow-etl.fullname" . }}-test-internal-observability"
  labels:
    {{- include "glassflow-etl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
{{- if $vm }}
    - name: probe-vmsingle
      image: busybox
      command: ['wget']
      args:
        - '-qO-'
        - 'http://{{ include "glassflow-etl.internalVMService" . }}:8428/health'
{{- end }}
{{- if $vl }}
    - name: probe-vlogs
      image: busybox
      command: ['wget']
      args:
        - '-qO-'
        - 'http://{{ include "glassflow-etl.internalVLService" . }}:9428/health'
{{- end }}
{{- end }}
