{{- if .Values.ui.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: glassflow-ui-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glassflow-etl.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
data:
  HOSTNAME: "0.0.0.0"
  NEXT_PUBLIC_API_URL: "http://{{ .Release.Name }}-api.{{ .Release.Namespace }}.svc.cluster.local:8081"
  NEXT_PUBLIC_IN_DOCKER: "false"
  NEXT_PUBLIC_ANALYTICS_ENABLED: "{{ .Values.global.usageStats.enabled }}"
  NEXT_PUBLIC_NOTIFICATIONS_ENABLED: "{{ .Values.global.notifications.enabled }}"
  {{- if .Values.global.notifications.enabled }}
  NEXT_PUBLIC_NOTIFICATIONS_URL: "http://{{ .Release.Name }}-notifier.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.notificationService.service.port }}"
  {{- end }}
  NEXT_PUBLIC_AUTH0_ENABLED: "{{ .Values.ui.auth0.enabled }}"
  AUTH0_ENABLED: "{{ .Values.ui.auth0.enabled }}"
  NEXT_PUBLIC_OTEL_LOGS_ENABLED: "{{ .Values.global.observability.logs.enabled }}"
  NEXT_PUBLIC_OTEL_METRICS_ENABLED: "{{ .Values.global.observability.metrics.enabled }}"
  NEXT_PUBLIC_OTEL_SERVICE_NAME: "glassflow-ui"
  NEXT_PUBLIC_OTEL_SERVICE_VERSION: "{{ .Values.ui.image.tag }}"
  NEXT_PUBLIC_OTEL_SERVICE_NAMESPACE: "{{ .Release.Namespace }}"
  NEXT_PUBLIC_OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ .Release.Name }}-otel-collector.{{ .Release.Namespace }}.svc.cluster.local:4318"
  NEXT_PUBLIC_LOG_LEVEL: "{{ .Values.ui.logLevel }}"
  {{- if .Values.ui.auth0.enabled }}
  NEXT_PUBLIC_PROFILE_ROUTE: "{{ .Values.ui.auth0.profileRoute | default "/api/auth/me" }}"
  AUTH0_SECRET: "{{ .Values.ui.auth0.secret }}"
  APP_BASE_URL: "{{ .Values.ui.auth0.appBaseUrl }}"
  AUTH0_DOMAIN: "{{ .Values.ui.auth0.domain }}"
  AUTH0_ISSUER_BASE_URL: "{{ .Values.ui.auth0.issuerBaseUrl }}"
  AUTH0_CLIENT_ID: "{{ .Values.ui.auth0.clientId }}"
  AUTH0_CLIENT_SECRET: "{{ .Values.ui.auth0.clientSecret }}"
  {{- end }}
  {{- if .Values.ui.kafkaGateway.enabled }}
  KAFKA_GATEWAY_URL: "http://localhost:{{ .Values.ui.kafkaGateway.port }}"
  {{- end }}
  # Pipeline resource defaults (individual vars for build/runtime override; same source as API)
  NEXT_PUBLIC_NATS_MAX_STREAM_AGE: {{ .Values.global.nats.stream.maxAge | default "24h" | quote }}
  NEXT_PUBLIC_NATS_MAX_STREAM_BYTES: {{ .Values.global.nats.stream.maxBytes | default "0" | quote }}
  NEXT_PUBLIC_INGESTOR_CPU_REQUEST: {{ (index .Values "glassflow-operator").glassflowComponents.ingestor.resources.requests.cpu | default "100m" | quote }}
  NEXT_PUBLIC_INGESTOR_CPU_LIMIT: {{ (index .Values "glassflow-operator").glassflowComponents.ingestor.resources.limits.cpu | default "1500m" | quote }}
  NEXT_PUBLIC_INGESTOR_MEMORY_REQUEST: {{ (index .Values "glassflow-operator").glassflowComponents.ingestor.resources.requests.memory | default "128Mi" | quote }}
  NEXT_PUBLIC_INGESTOR_MEMORY_LIMIT: {{ (index .Values "glassflow-operator").glassflowComponents.ingestor.resources.limits.memory | default "1.5Gi" | quote }}
  NEXT_PUBLIC_JOIN_CPU_REQUEST: {{ (index .Values "glassflow-operator").glassflowComponents.join.resources.requests.cpu | default "100m" | quote }}
  NEXT_PUBLIC_JOIN_CPU_LIMIT: {{ (index .Values "glassflow-operator").glassflowComponents.join.resources.limits.cpu | default "1500m" | quote }}
  NEXT_PUBLIC_JOIN_MEMORY_REQUEST: {{ (index .Values "glassflow-operator").glassflowComponents.join.resources.requests.memory | default "128Mi" | quote }}
  NEXT_PUBLIC_JOIN_MEMORY_LIMIT: {{ (index .Values "glassflow-operator").glassflowComponents.join.resources.limits.memory | default "1.5Gi" | quote }}
  NEXT_PUBLIC_SINK_CPU_REQUEST: {{ (index .Values "glassflow-operator").glassflowComponents.sink.resources.requests.cpu | default "100m" | quote }}
  NEXT_PUBLIC_SINK_CPU_LIMIT: {{ (index .Values "glassflow-operator").glassflowComponents.sink.resources.limits.cpu | default "1500m" | quote }}
  NEXT_PUBLIC_SINK_MEMORY_REQUEST: {{ (index .Values "glassflow-operator").glassflowComponents.sink.resources.requests.memory | default "128Mi" | quote }}
  NEXT_PUBLIC_SINK_MEMORY_LIMIT: {{ (index .Values "glassflow-operator").glassflowComponents.sink.resources.limits.memory | default "1.5Gi" | quote }}
  NEXT_PUBLIC_DEDUP_CPU_REQUEST: {{ (index .Values "glassflow-operator").glassflowComponents.dedup.resources.requests.cpu | default "100m" | quote }}
  NEXT_PUBLIC_DEDUP_CPU_LIMIT: {{ (index .Values "glassflow-operator").glassflowComponents.dedup.resources.limits.cpu | default "1500m" | quote }}
  NEXT_PUBLIC_DEDUP_MEMORY_REQUEST: {{ (index .Values "glassflow-operator").glassflowComponents.dedup.resources.requests.memory | default "128Mi" | quote }}
  NEXT_PUBLIC_DEDUP_MEMORY_LIMIT: {{ (index .Values "glassflow-operator").glassflowComponents.dedup.resources.limits.memory | default "1.5Gi" | quote }}
  NEXT_PUBLIC_DEDUP_STORAGE_SIZE: {{ (index .Values "glassflow-operator").glassflowComponents.dedup.storage.size | default "10Gi" | quote }}
  NEXT_PUBLIC_DEDUP_STORAGE_CLASS: {{ (index .Values "glassflow-operator").glassflowComponents.dedup.storage.className | default "" | quote }}
{{- end }}
