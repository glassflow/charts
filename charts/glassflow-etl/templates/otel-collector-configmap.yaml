{{- if or .Values.global.observability.metrics.enabled .Values.global.observability.logs.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
{{- if and .Values.nats.enabled .Values.global.observability.metrics.enabled }}
      prometheus:
        config:
          scrape_configs:
            - job_name: 'nats-exporter'
              static_configs:
                - targets: ['{{ .Release.Name }}-prometheus-nats-exporter.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.natsPrometheusExporter.service.port }}']
              scrape_interval: 15s
              metrics_path: /metrics
{{- end }}

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      resource:
        attributes:
          - key: service.name
            from_attribute: service.name
            action: insert
          - key: service.version
            from_attribute: service.version
            action: insert
          - key: service.namespace
            from_attribute: service.namespace
            action: insert
{{- if .Values.global.observability.logs.enabled }}
  {{- range $name, $cfg := (default dict .Values.global.observability.logs.extraProcessors) }}
      {{ $name }}: {{- toYaml $cfg | nindent 8 }}
  {{- end }}
{{- end }}
{{- if .Values.global.observability.metrics.enabled }}
  {{- range $name, $cfg := (default dict .Values.global.observability.metrics.extraProcessors) }}
      {{ $name }}: {{- toYaml $cfg | nindent 8 }}
  {{- end }}
{{- end }}

    exporters:
{{- if .Values.global.observability.logs.enabled }}
  {{- range $name, $cfg := .Values.global.observability.logs.exporter }}
      {{ $name }}: {{- toYaml $cfg | nindent 8 }}
  {{- end }}
{{- end }}
{{- if .Values.global.observability.metrics.enabled }}
      prometheus:
        endpoint: "0.0.0.0:9090"
        namespace: {{ .Release.Namespace }}
        send_timestamps: true
        enable_open_metrics: true
  {{- range $name, $cfg := (default dict .Values.global.observability.metrics.extraExporters) }}
      {{ $name }}: {{- toYaml $cfg | nindent 8 }}
  {{- end }}
{{- end }}
        
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
{{- if .Values.global.observability.logs.enabled }}
          {{- $logExporters := keys .Values.global.observability.logs.exporter | sortAlpha -}}
          {{- if eq (len $logExporters) 0 -}}
          {{- fail "logs.enabled=true requires at least one exporter configured under global.observability.logs.exporter" -}}
          {{- end }}
          {{- $logExtraProcessors := keys (default dict .Values.global.observability.logs.extraProcessors) | sortAlpha }}
        logs:
          receivers: [otlp]
          processors: [{{ if $logExtraProcessors }}{{ join ", " $logExtraProcessors }}, {{ end }}resource, batch]
          exporters: [{{ join ", " $logExporters }}]
{{- end }}
{{- if .Values.global.observability.metrics.enabled }}
          {{- $metricsExtraExporters := keys (default dict .Values.global.observability.metrics.extraExporters) | sortAlpha }}
          {{- $metricsExtraProcessors := keys (default dict .Values.global.observability.metrics.extraProcessors) | sortAlpha }}
        metrics:
          receivers: [otlp{{- if .Values.nats.enabled }}, prometheus{{- end }}]
          processors: [{{ if $metricsExtraProcessors }}{{ join ", " $metricsExtraProcessors }}, {{ end }}resource, batch]
          exporters: [prometheus{{ if $metricsExtraExporters }}, {{ join ", " $metricsExtraExporters }}{{ end }}]
{{- end }}
{{- end }}
