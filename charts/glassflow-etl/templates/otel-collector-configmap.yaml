{{- /* Validate observability config first — fails install on bad combinations. */ -}}
{{- include "glassflow-etl.observability.validate" . -}}
{{- $metricsEnabled := .Values.global.observability.metrics.enabled -}}
{{- $logsEnabled := .Values.global.observability.logs.enabled -}}
{{- $metricsInternal := .Values.global.observability.metrics.internal.enabled -}}
{{- $logsInternal := .Values.global.observability.logs.internal.enabled -}}
{{- if or $metricsEnabled $logsEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
{{- if and .Values.nats.enabled $metricsEnabled }}
      prometheus:
        config:
          scrape_configs:
            - job_name: 'nats-exporter'
              static_configs:
                - targets: ['{{ .Release.Name }}-prometheus-nats-exporter.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.natsPrometheusExporter.service.port }}']
              scrape_interval: 15s
              metrics_path: /metrics
{{- end }}

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      resource:
        attributes:
          - key: service.name
            from_attribute: service.name
            action: insert
          - key: service.version
            from_attribute: service.version
            action: insert
          - key: service.namespace
            from_attribute: service.namespace
            action: insert
{{- if $logsEnabled }}
  {{- range $name, $cfg := (default dict .Values.global.observability.logs.extraProcessors) }}
      {{ $name }}: {{- toYaml $cfg | nindent 8 }}
  {{- end }}
{{- end }}
{{- if $metricsEnabled }}
  {{- range $name, $cfg := (default dict .Values.global.observability.metrics.extraProcessors) }}
      {{ $name }}: {{- toYaml $cfg | nindent 8 }}
  {{- end }}
{{- end }}

    exporters:
{{- if $logsEnabled }}
  {{- range $name, $cfg := .Values.global.observability.logs.exporter }}
      {{ $name }}: {{- toYaml $cfg | nindent 8 }}
  {{- end }}
  {{- if $logsInternal }}
      otlphttp/internal_logs:
        endpoint: "http://{{ include "glassflow-etl.internalVLService" . }}:9428/insert/opentelemetry"
        tls:
          insecure: true
  {{- end }}
{{- end }}
{{- if $metricsEnabled }}
      prometheus:
        endpoint: "0.0.0.0:9090"
        namespace: {{ .Release.Namespace }}
        send_timestamps: true
        enable_open_metrics: true
  {{- range $name, $cfg := (default dict .Values.global.observability.metrics.extraExporters) }}
      {{ $name }}: {{- toYaml $cfg | nindent 8 }}
  {{- end }}
  {{- if $metricsInternal }}
      prometheusremotewrite/internal:
        endpoint: "http://{{ include "glassflow-etl.internalVMService" . }}:8428/api/v1/write"
        tls:
          insecure: true
  {{- end }}
{{- end }}

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
{{- if $logsEnabled }}
          {{- $logExporters := keys (default dict .Values.global.observability.logs.exporter) | sortAlpha }}
          {{- if $logsInternal }}
          {{- $logExporters = append $logExporters "otlphttp/internal_logs" }}
          {{- end }}
          {{- if eq (len $logExporters) 0 -}}
          {{- fail "logs.enabled=true requires at least one exporter — configure global.observability.logs.exporter or set global.observability.logs.internal.enabled=true" -}}
          {{- end }}
          {{- $logExtraProcessors := keys (default dict .Values.global.observability.logs.extraProcessors) | sortAlpha }}
        logs:
          receivers: [otlp]
          processors: [{{ if $logExtraProcessors }}{{ join ", " $logExtraProcessors }}, {{ end }}resource, batch]
          exporters: [{{ join ", " $logExporters }}]
{{- end }}
{{- if $metricsEnabled }}
          {{- $metricsExporters := keys (default dict .Values.global.observability.metrics.extraExporters) | sortAlpha }}
          {{- $metricsExporters = prepend $metricsExporters "prometheus" }}
          {{- if $metricsInternal }}
          {{- $metricsExporters = append $metricsExporters "prometheusremotewrite/internal" }}
          {{- end }}
          {{- $metricsExtraProcessors := keys (default dict .Values.global.observability.metrics.extraProcessors) | sortAlpha }}
        metrics:
          receivers: [otlp{{- if .Values.nats.enabled }}, prometheus{{- end }}]
          processors: [{{ if $metricsExtraProcessors }}{{ join ", " $metricsExtraProcessors }}, {{ end }}resource, batch]
          exporters: [{{ join ", " $metricsExporters }}]
{{- end }}
{{- end }}
