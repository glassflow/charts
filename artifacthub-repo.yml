# ArtifactHub repository metadata.
# https://artifacthub.io/docs/topics/repositories/helm-charts/
#
# - The `owners` block claims this Helm repository under the listed account on
#   ArtifactHub. The email must match the email on the ArtifactHub user that
#   adds this repository in the UI.
# - `repositoryID` is filled in after the first UI registration on
#   artifacthub.io. With it set, the listing displays the "Verified Publisher"
#   badge and ArtifactHub knows this repo is the source of truth.

repositoryID: 33d8f009-42db-43c0-a839-4f48411bad9c

owners:
  - name: GlassFlow
    email: info@glassflow.dev

# Skip security scanning of legacy chart versions whose container image
# references no longer exist in the registry (e.g., glassflow/clickhouse-etl-fe:stable,
# glassflow-etl-k8s-operator:v1.0.0). Versions 0.5.0 and later scan cleanly.
#
# `glassflow-operator` is also fully ignored here: a stale 0.1.0 release is
# leftover in this repo from before the operator chart moved to its own repo
# at https://glassflow.github.io/glassflow-etl-k8s-operator. The real chart is
# registered separately on ArtifactHub.
ignore:
  - name: glassflow-etl
    version: ^0\.[0-4]\.
  - name: glassflow-operator
